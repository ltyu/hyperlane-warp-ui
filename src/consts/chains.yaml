# A map of chain names to ChainMetadata
# Chains can be defined here, in chains.json, or in chains.ts
# Chains already in the SDK need not be included here unless you want to override some fields
# Schema here: https://github.com/hyperlane-xyz/hyperlane-monorepo/blob/main/typescript/sdk/src/metadata/chainMetadataTypes.ts
---
# Example using local anvil chain:
# anvil1:
#   chainId: 31337
#   domainId: 31337
#   name: anvil1
#   protocol: ethereum
#   rpcUrls:
#     - http: http://127.0.0.1:8545
# anvil2:
#   chainId: 31338
#   domainId: 31338
#   name: anvil2
#   protocol: ethereum
#   rpcUrls:
#     - http: http://127.0.0.1:8555
artio:
  name: artio
  chainId: 80085
  domainId: 80085
  protocol: ethereum
  rpcUrls:
    - http: 'https://artio.rpc.berachain.com'
  nativeToken:
    name: BERA # String
    symbol: BERA # String
    decimals: 18 # Number
  blocks:
    confirmations: 1 # Number: Blocks to wait before considering a transaction confirmed
  logoURI: /logos/BERA.svg
